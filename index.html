<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地狱验证码挑战</title>
    <style>
        :root {
            --primary: #4285f4;
            --bg: #202124;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        .start-container {
            text-align: center;
            padding: 40px;
            border: 1px solid #3c4043;
            border-radius: 12px;
            background: #292a2d;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff4e50, #f9d423);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #9aa0a6;
            margin-bottom: 30px;
        }
        .start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            font-weight: bold;
        }
        .start-btn:hover {
            background-color: #357ae8;
            transform: scale(1.05);
        }
        .warning {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #ea4335;
        }
    </style>
</head>
<body>
    <div class="start-container">
        <h1>这里是地狱验证码挑战游戏！</h1>
        <p>证明你不仅是一个人类，还是一个极具耐心的人类。</p>
        
        <button class="start-btn" onclick="startGame()">开始游戏！</button>
        
        <div class="warning">警告：过程可能导致轻微的血压升高</div>
    </div>

    <script>
        function startGame() {
            // 跳转到你的挑战页面
            location.href = '/guesscaptcha';
        }
    </script>
</body>
</html>
